      <title>NET Preparation Pakistan | NUST Entry Test MCQs</title>

        name="description"

      <meta

        content="NET preparation, NUST entry test, MCQs Pakistan, Physics MCQs"

      <style>
        html,
        body,
        #root {
          min-height: 100%;
        }
        body {
          margin: 0;
          background-color: #f1f5f9;
        }
        html.dark body {
          background-color: #0f172a;
        }
      </style>
      <script>
        (function () {
          try {
            var saved = localStorage.getItem('net360-theme-mode');
            if (saved === 'light') {
              document.documentElement.classList.remove('dark');
            } else {
              document.documentElement.classList.add('dark');
            }
          } catch (e) {}
        })();
      </script>
      <script type="application/ld+json">
        {
          "@context": "https://schema.org",
          "@type": "EducationalApplication",
          "name": "NET360 Preparation",
          "description": "Platform for NET preparation with MCQs and mock tests"
        }
      </script>
    </head>
