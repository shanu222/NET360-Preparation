      <link rel="icon" href="/favicon-192.png" type="image/png" sizes="192x192" />

      />
      <meta
        name="keywords"
        content="NET preparation, NUST entry test, MCQs Pakistan, Physics MCQs"
      />
      <meta name="robots" content="index, follow" />
      <style>
        html,
        body,
        #root {
          min-height: 100%;
          min-height: 100dvh;
          width: 100%;
          max-width: 100%;
        }
        html,
        body {
          overflow-x: hidden;
        }
        #root {
          display: flex;
          flex-direction: column;
          overflow-x: hidden;
        }
        body {
          margin: 0;
          background-color: #f1f5f9;
        }
        html.dark body {
          background-color: #0f172a;
        }
      </style>
      <script>
        (function () {
          try {
            var saved = localStorage.getItem('net360-theme-mode');
            if (saved === 'light') {
              document.documentElement.classList.remove('dark');
            } else {
              document.documentElement.classList.add('dark');
            }
          } catch (e) {}
        })();
      </script>
      <script type="application/ld+json">
        {
          "@context": "https://schema.org",
          "@type": "EducationalApplication",
          "name": "NET360 Preparation",
          "description": "Platform for NET preparation with MCQs and mock tests",
          "image": "https://net360preparation.com/net360-logo.png"
        }
      </script>
