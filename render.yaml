services:
  - type: web
    name: net360-preparation
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start:web
    autoDeploy: true
    envVars:
      - key: VITE_API_URL
        # Replace with your live backend API URL.
        value: https://api.net360preparation.com
      - key: VITE_DISABLE_LOCAL_API_FALLBACK
        value: "true"

  - type: web
    name: net360-admin
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start:web
    autoDeploy: true
    envVars:
      - key: VITE_ADMIN_ONLY
        value: "true"
      - key: VITE_API_URL
        # Replace with your live backend API URL.
        value: https://api.net360preparation.com
      - key: VITE_DISABLE_LOCAL_API_FALLBACK
        value: "true"
