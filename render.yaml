services:
  - type: web
    name: net360-preparation
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npx vite preview --host 0.0.0.0 --port $PORT
    autoDeploy: true

  - type: web
    name: net360-admin
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npx vite preview --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: VITE_ADMIN_ONLY
        value: "true"
      - key: VITE_API_BASE_URL
        # Replace with your live backend API URL.
        value: https://net360-api.onrender.com
      - key: VITE_DISABLE_LOCAL_API_FALLBACK
        value: "true"
