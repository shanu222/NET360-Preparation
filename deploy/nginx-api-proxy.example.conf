# Example: reverse-proxy Node (Express) for api.net360preparation.com
#
# =============================================================================
# CORS / PROXY: Express owns all CORS (Access-Control-*). Nginx must NOT add them.
# =============================================================================
# Never use: add_header Access-Control-* on this server unless DISABLE_EXPRESS_CORS=true
# on Node and you implement a single CORS layer (see comments below).
#
# Wrong: proxy_set_header Connection "upgrade"; for every request — breaks normal POST.
# Use map $http_upgrade $connection_upgrade (below).
#
# Also check Cloudflare: disable "CORS" style transforms / duplicate headers on api.*.
# =============================================================================

upstream net360_node {
  server 127.0.0.1:5000;
  keepalive 32;
}

map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

server {
  listen 443 ssl http2;
  server_name api.net360preparation.com;

  # ssl_certificate ...;
  # ssl_certificate_key ...;

  location / {
    proxy_pass http://net360_node;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket / Socket.IO (only when client sends Upgrade)
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    proxy_connect_timeout 75s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;
    proxy_buffering off;

    # --- Express handles CORS: no add_header Access-Control-* here ---
    #
    # Alternative (single CORS layer): set DISABLE_EXPRESS_CORS=true on Node, then use e.g.:
    # map $http_origin $cors_allow_origin { ... }
    # add_header Access-Control-Allow-Origin $cors_allow_origin always;
    # add_header Access-Control-Allow-Credentials "true" always;
    # add_header Vary "Origin" always;
    # Preflight must list every non-simple header the SPA sends, e.g.:
    # add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Net360-Client-Platform, X-Net360-Auth-Transport-Preference, Cookie, Accept, Origin" always;
    # add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS, HEAD" always;
  }
}
