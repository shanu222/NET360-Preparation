# Example: reverse-proxy Node (Express) for api.net360preparation.com
#
# =============================================================================
# LOGIN / CORS: "multiple values" for Access-Control-Allow-Origin
# =============================================================================
# Browsers allow at most ONE Access-Control-Allow-Origin value. If you see:
#   ... header contains multiple values 'https://net360preparation.com, https://www...'
# common causes:
#
#  (A) Nginx has a SINGLE header listing two URLs (INVALID — never do this):
#        add_header Access-Control-Allow-Origin "https://net360preparation.com, https://www.net360preparation.com";
#
#  (B) Nginx AND Express both add Access-Control-Allow-Origin (two headers → browser merges / rejects).
#
# FIX (recommended): Let Node set CORS only.
#   - Remove EVERY add_header Access-Control-* from this server { } block for the API.
#   - Do NOT set DISABLE_EXPRESS_CORS on the API (leave Express cors() enabled).
#   - Reload nginx: nginx -t && systemctl reload nginx
#
# FIX (alternative): CORS only at nginx.
#   - Set DISABLE_EXPRESS_CORS=true on the Node process.
#   - Use the map below to echo back ONE origin from an allowlist (never comma-separate origins).
#
# Also check Cloudflare (or other proxies): disable extra CORS headers for the API host.
# =============================================================================

upstream net360_node {
  server 127.0.0.1:5000;
  keepalive 32;
}

# Optional: use ONLY if DISABLE_EXPRESS_CORS=true on Node (pick proxy OR Node for CORS, never both).
# map $http_origin $cors_allow_origin {
#   default "";
#   "~^https://net360preparation\.com$" $http_origin;
#   "~^https://www\.net360preparation\.com$" $http_origin;
# }

server {
  listen 443 ssl http2;
  server_name api.net360preparation.com;

  # ssl_certificate ...;
  # ssl_certificate_key ...;

  location / {
    proxy_pass http://net360_node;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # --- Preferred (Express handles CORS): no add_header Access-Control-* here ---
    #
    # If you use the map + DISABLE_EXPRESS_CORS=true instead, uncomment e.g.:
    # add_header Access-Control-Allow-Origin $cors_allow_origin always;
    # add_header Access-Control-Allow-Credentials "true" always;
    # add_header Vary "Origin" always;
    # if ($request_method = OPTIONS) { return 204; }
  }
}
