# Example: reverse-proxy Node (Express) for api.net360preparation.com
# Duplicate CORS fix: do NOT use add_header Access-Control-* here if Express already uses `cors()`.
# Browsers error when two layers both set Access-Control-Allow-Origin (values merge with comma).
#
# 1) Preferred: proxy only — let Node set all CORS (see server/index.js cors({ origin: true })).
# 2) Alternative: set DISABLE_EXPRESS_CORS=true on Node and set CORS once in this file (not both).

upstream net360_node {
  server 127.0.0.1:5000;
  keepalive 32;
}

server {
  listen 443 ssl http2;
  server_name api.net360preparation.com;

  # ssl_certificate ...;
  # ssl_certificate_key ...;

  location / {
    proxy_pass http://net360_node;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    # No add_header Access-Control-* — Express handles CORS
  }
}
